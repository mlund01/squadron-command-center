# fly.toml — Fly.io app configuration for Commander.
# When deploying via the Launch button, Fly will prompt you to pick an app
# name and region; this file supplies the rest.

primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
